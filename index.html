<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>הטיול הגדול ✈️ — מדריך המטייל הישראלי</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="tailwind.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { hebrew: ['Heebo', 'sans-serif'] }
        }
      }
    };
  </script>
  <style>
    * { font-family: 'Heebo', sans-serif; direction: rtl; }
    html { scroll-behavior: smooth; }
    body { background: #0a0a0f; color: #fff; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: linear-gradient(#f59e0b,#ef4444); border-radius: 10px; }
    .grad-main { background: linear-gradient(135deg,#f59e0b,#ef4444,#8b5cf6); }
    .grad-text { background: linear-gradient(135deg,#f59e0b,#ef4444,#8b5cf6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .grad-text-2 { background: linear-gradient(135deg,#14b8a6,#3b82f6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; }
    .card-hover { transition: all .3s; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,.4); }
    @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes bgAnim { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
    .animate-fade { animation: fadeIn .6s ease-out; }
    .hero-bg {
      background: linear-gradient(-45deg,#0f0522,#1a0533,#0d1b3e,#1a1208);
      background-size: 400% 400%;
      animation: bgAnim 12s ease infinite;
    }
    .tab-btn { padding: 8px 16px; border-radius: 10px; font-weight: 700; font-size: 13px; transition: all .2s; cursor: pointer; border: none; }
    .tab-active { background: linear-gradient(135deg,#f59e0b,#ef4444); color: white; }
    .tab-inactive { background: rgba(255,255,255,0.07); color: #9ca3af; }
    .tab-inactive:hover { background: rgba(255,255,255,0.12); color: white; }
    input[type=range] { accent-color: #f59e0b; width: 100%; }
    select { background: rgba(255,255,255,0.08); color: white; border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 10px 14px; width: 100%; outline: none; font-family: Heebo, sans-serif; }
    select option { background: #1a1a2e; }
    input[type=text] { background: rgba(255,255,255,0.08); color: white; border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 12px 16px; width: 100%; outline: none; font-family: Heebo, sans-serif; font-size: 16px; }
    input[type=text]::placeholder { color: #6b7280; }
    .progress-bar { height: 8px; border-radius: 4px; transition: width 1s ease; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .glow-orange { box-shadow: 0 0 25px rgba(245,158,11,0.4); }
    .glow-purple { box-shadow: 0 0 25px rgba(139,92,246,0.4); }
    iframe { border: none; border-radius: 12px; }
    /* Mobile bottom nav padding */
    @media(max-width:768px){ .page-content { padding-bottom: 80px !important; } }
    /* Pulse animation for hot badges */
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    /* Shimmer loading effect */
    @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
    .shimmer { background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%); background-size: 200% 100%; animation: shimmer 2s infinite; }
    /* Float animation for hero */
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .float { animation: float 4s ease-in-out infinite; }
    /* Gradient border */
    .grad-border { border: 1px solid transparent; background-clip: padding-box; position: relative; }
    .grad-border::before { content:''; position:absolute; inset:0; border-radius:inherit; padding:1px; background:linear-gradient(135deg,#f59e0b,#ef4444,#8b5cf6); -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events:none; }
    /* Smooth section transitions */
    .section-fade { opacity: 0; transform: translateY(30px); transition: opacity 0.6s ease, transform 0.6s ease; }
    .section-fade.visible { opacity: 1; transform: translateY(0); }
    /* Hot tag glow */
    .hot-glow { box-shadow: 0 0 15px rgba(239,68,68,0.5); }
    /* Number counter gradient */
    .num-grad { background: linear-gradient(135deg,#f59e0b,#ef4444); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; font-weight:900; }
    /* Card with gradient top border */
    .card-top-border { border-top: 3px solid; border-image: linear-gradient(90deg,#f59e0b,#ef4444) 1; }
  </style>
</head>
<body dir="rtl">
<div id="root"></div>

<!-- Scroll animations -->
<script>
  document.addEventListener('DOMContentLoaded', function() {
    var io = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) { if (e.isIntersecting) { e.target.classList.add('visible'); } });
    }, { threshold: 0.1 });
    document.querySelectorAll('.section-fade').forEach(function(el) { io.observe(el); });
    new MutationObserver(function() {
      document.querySelectorAll('.section-fade:not(.visible)').forEach(function(el) { io.observe(el); });
    }).observe(document.body, { childList: true, subtree: true });
  });
</script>

<!-- React + Babel -->
<script src="react.min.js" crossorigin></script>
<script src="react-dom.min.js" crossorigin></script>
<script src="babel.min.js"></script>

<!-- Data layer -->
<script src="data.js?v=5"></script>
<!-- 18 יעדים חדשים -->
<script src="temp_dests_1.js?v=1"></script>
<script src="temp_dests_2.js?v=1"></script>
<script src="temp_dests_3.js?v=1"></script>
<script src="merge_dests.js?v=1"></script>
<!-- Destination summaries & links -->
<script src="dest_summaries.js?v=1"></script>
<!-- Rich category data -->
<script src="rich_cats_a.js?v=1"></script>
<script src="rich_cats_b.js?v=1"></script>
<script src="rich_cats_c.js?v=1"></script>
<script src="rich_enrich.js?v=1"></script>
<script src="rich_enrich2.js?v=8"></script>
<!-- Page components -->
<script src="pages.js?v=9"></script>

<!-- Main App -->
<script type="text/babel">
// ─── NAVBAR ────────────────────────────────────────────────────────────────
var NAV_ITEMS = [
  { id:'home',        emoji:'🏠', label:'בית' },
  { id:'destinations',emoji:'🔍', label:'חיפוש יעד' },
  { id:'packing',     emoji:'🎒', label:'רשימת ציוד' },
  { id:'comparison',  emoji:'⚖️', label:'מזרח vs אמריקה' },
  { id:'facebook',    emoji:'👥', label:'קבוצות פייסבוק' },
  { id:'compare-dest',emoji:'🗺️', label:'השוואת יעדים' },
  { id:'insurance',   emoji:'🛡️', label:'ביטוח נסיעות' },
  { id:'budget',      emoji:'💰', label:'מחשבון תקציב' },
  { id:'tips',        emoji:'💡', label:'טיפים' },
  { id:'solovgroup',  emoji:'🤝', label:'לבד או עם חברים' },
];

function Navbar({ activePage, setActivePage }) {
  var [open, setOpen] = React.useState(false);
  var navStyle = {
    position:'fixed', top:0, right:0, left:0, zIndex:100,
    background:'rgba(10,10,20,0.97)', backdropFilter:'blur(20px)',
    borderBottom:'1px solid rgba(255,255,255,0.08)'
  };
  var logoGrad = {
    background:'linear-gradient(135deg,#f59e0b,#ef4444,#8b5cf6)',
    WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent'
  };
  return (
    <nav style={navStyle}>
      {/* Desktop */}
      <div className="hidden md:flex items-center justify-between px-6 py-3 max-w-7xl mx-auto">
        <button onClick={() => setActivePage('home')} className="flex items-center gap-2 shrink-0">
          <span style={{fontSize:24}}>✈️</span>
          <div>
            <div style={{...logoGrad, fontWeight:900, fontSize:18, lineHeight:1.1}}>הטיול הגדול</div>
            <div style={{color:'#6b7280', fontSize:11}}>מדריך המטייל הישראלי</div>
          </div>
        </button>
        <div className="flex flex-wrap gap-1 justify-end">
          {NAV_ITEMS.slice(1).map(item => (
            <button key={item.id} onClick={() => setActivePage(item.id)}
              className={activePage === item.id ? 'tab-btn tab-active' : 'tab-btn tab-inactive'}>
              {item.emoji} {item.label}
            </button>
          ))}
        </div>
      </div>
      {/* Mobile top */}
      <div className="flex md:hidden items-center justify-between px-4 py-3">
        <button onClick={() => setActivePage('home')} className="flex items-center gap-2">
          <span>✈️</span>
          <span style={{...logoGrad, fontWeight:900, fontSize:17}}>הטיול הגדול</span>
        </button>
        <button onClick={() => setOpen(!open)}
          style={{background:'rgba(255,255,255,0.1)', border:'none', color:'white', borderRadius:8, padding:'6px 10px', cursor:'pointer', fontSize:18}}>
          {open ? '✕' : '☰'}
        </button>
      </div>
      {/* Mobile dropdown */}
      {open && (
        <div style={{background:'rgba(10,10,20,0.99)', borderTop:'1px solid rgba(255,255,255,0.08)'}}>
          {NAV_ITEMS.map(item => (
            <button key={item.id}
              onClick={() => { setActivePage(item.id); setOpen(false); }}
              style={{
                display:'block', width:'100%', textAlign:'right', padding:'12px 20px',
                background: activePage===item.id ? 'rgba(245,158,11,0.1)' : 'transparent',
                color: activePage===item.id ? '#f59e0b' : '#d1d5db',
                border:'none', cursor:'pointer', fontFamily:'Heebo,sans-serif', fontSize:14, fontWeight:600
              }}>
              {item.emoji} {item.label}
            </button>
          ))}
        </div>
      )}
      {/* Mobile bottom nav */}
      <div className="fixed bottom-0 right-0 left-0 md:hidden"
        style={{background:'rgba(10,10,20,0.97)', borderTop:'1px solid rgba(255,255,255,0.08)', zIndex:100}}>
        <div className="flex justify-around py-2">
          {[
            {id:'home',emoji:'🏠',label:'בית'},
            {id:'destinations',emoji:'🔍',label:'יעדים'},
            {id:'budget',emoji:'💰',label:'תקציב'},
            {id:'tips',emoji:'💡',label:'טיפים'},
            {id:'insurance',emoji:'🛡️',label:'ביטוח'},
          ].map(item => (
            <button key={item.id} onClick={() => setActivePage(item.id)}
              style={{background:'none', border:'none', cursor:'pointer', display:'flex', flexDirection:'column', alignItems:'center', gap:2, opacity: activePage===item.id ? 1 : 0.45}}>
              <span style={{fontSize:22}}>{item.emoji}</span>
              <span style={{fontSize:10, color: activePage===item.id ? '#f59e0b' : '#9ca3af', fontFamily:'Heebo,sans-serif', fontWeight:600}}>{item.label}</span>
            </button>
          ))}
        </div>
      </div>
    </nav>
  );
}

// ─── APP ───────────────────────────────────────────────────────────────────
function App() {
  var [activePage, setActivePage] = React.useState('home');
  var [selectedDest, setSelectedDest] = React.useState(null);

  function navigate(page, dest) {
    setActivePage(page);
    if (dest !== undefined) setSelectedDest(dest);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function renderPage() {
    switch(activePage) {
      case 'home':
        return <HomePage setActivePage={(p) => navigate(p)} setSelectedDest={(d) => { setSelectedDest(d); navigate('destinations'); }} />;
      case 'destinations':
        return <DestinationExplorer initialDest={selectedDest} setActivePage={navigate} />;
      case 'packing':        return <PackingList />;
      case 'comparison':     return <AmericaVsAsia />;
      case 'facebook':       return <FacebookGroups />;
      case 'compare-dest':   return <DestinationComparison />;
      case 'insurance':      return <InsuranceGuide />;
      case 'budget':         return <BudgetCalculator />;
      case 'tips':           return <TravelerTips />;
      case 'solovgroup':     return <SoloVsGroup />;
      default:               return <HomePage setActivePage={navigate} setSelectedDest={(d) => { setSelectedDest(d); navigate('destinations'); }} />;
    }
  }

  return (
    <div style={{minHeight:'100vh', background:'#0a0a0f', direction:'rtl'}}>
      <Navbar activePage={activePage} setActivePage={navigate} />
      <div style={{paddingTop: 60}} className="page-content">
        {renderPage()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
